<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300" fill="none">
  <!-- IQ Mark (white version for dark backgrounds) -->
  <!-- Q circle -->
  <circle cx="120" cy="100" r="68" stroke="#ffffff" stroke-width="13" fill="none"/>
  <!-- Q tail -->
  <line x1="158" y1="148" x2="200" y2="190" stroke="#ffffff" stroke-width="13" stroke-linecap="round"/>
  <!-- I bar -->
  <rect x="113" y="24" width="12" height="152" rx="1" fill="rgba(255,255,255,0.7)"/>

  <!-- MAINSTREET IQ -->
  <text x="120" y="238" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="600" letter-spacing="4" fill="#ffffff">MAINSTREET IQ</text>

  <!-- CORPORATE ADVISORY SERVICES -->
  <text x="120" y="260" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="8.5" font-weight="500" letter-spacing="3" fill="rgba(255,255,255,0.6)">CORPORATE ADVISORY SERVICES</text>
</svg>
