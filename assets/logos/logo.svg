<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none">
  <!-- Q circle -->
  <circle cx="100" cy="90" r="70" stroke="#2B5EA7" stroke-width="12" fill="none"/>
  <!-- Q tail (diagonal) -->
  <line x1="130" y1="130" x2="170" y2="170" stroke="#2B5EA7" stroke-width="12" stroke-linecap="round"/>
  <!-- I bar (vertical, centered, overlapping the circle) -->
  <rect x="91" y="16" width="12" height="148" rx="2" fill="#5B9BD5"/>
  <!-- MAINSTREET IQ text -->
  <text x="100" y="205" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="3" fill="#2B5EA7">MAINSTREET IQ</text>
  <!-- Tagline -->
  <text x="100" y="228" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="9.5" font-weight="500" letter-spacing="2.5" fill="#5B9BD5">CORPORATE ADVISORY SERVICES</text>
</svg>
