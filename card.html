  <style>

      letter-spacing: -0.01em;
    }

    .card-title {

      font-weight: 300;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.03em;
    }

    .card-body {

    }

    .card-actions {

    }

    .card-btn {

      padding: 0.85rem 1.25rem;
      border-radius: 8px;
      text-decoration: none;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      transition: background 0.15s ease, transform 0.1s ease;
      cursor: pointer;
      border: none;
      width: 100%;
      text-align: left;
    }

    .card-btn:active { transform: scale(0.98); }

    .card-btn-primary {

      color: #fff;
    }
    .card-btn-primary:hover { background: #1e3d6e; }

    .card-btn-outline {
      background: transparent;
      color: var(--dark-text);
      border: 1px solid var(--border);
    }
    .card-btn-outline:hover { background: var(--ice); }

    .card-btn svg {

      height: 20px;

    .card-divider {

    .card-footer {

  <!-- QR Code Generator (lightweight, no dependencies) -->
  <script>
  // Minimal QR code generator — generates the card URL as a scannable QR
  (function(){
    var url = 'https://www.mainstreetiq.com/card';
    var canvas = document.getElementById('qr-canvas');
    var size = 140;
    canvas.width = size;
    canvas.height = size;

    // Load QR library from CDN
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js';
    s.onload = function(){
      var qr = qrcode(0, 'M');
      qr.addData(url);
      qr.make();
      var ctx = canvas.getContext('2d');
      var cells = qr.getModuleCount();
      var cellSize = size / cells;
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, size, size);
      ctx.fillStyle = '#0F1C2E';
      for (var r = 0; r < cells; r++) {
        for (var c = 0; c < cells; c++) {
          if (qr.isDark(r, c)) {
            ctx.fillRect(c * cellSize, r * cellSize, cellSize + 0.5, cellSize + 0.5);
          }
        }
      }
    };
    document.head.appendChild(s);
  })();
  </script>

  <!-- vCard download -->
  <script>
  function downloadVCard() {
    var vcard = [
      'BEGIN:VCARD',
      'VERSION:3.0',
      'N:Hess;Scott;;;',
      'FN:Scott Hess',
      'ORG:Main Street IQ',
      'TITLE:Fractional CFO',
      'TEL;TYPE=CELL:+1-310-463-5638',
      'EMAIL;TYPE=INTERNET,WORK:scott@mainstreetiq.com',
      'URL:https://www.mainstreetiq.com',
      'URL;TYPE=LinkedIn:https://www.linkedin.com/in/johnscotthess',
      'NOTE:Fractional & interim CFO for growing companies $10M-$100M. Book a call: https://calendly.com/scott_mainstreetiq/30min?utm_source=mainstreetiq-site&utm_medium=website&utm_campaign=card',
      'END:VCARD'
    ].join('\r\n');

    var blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'Scott-Hess-Mainstreet-IQ.vcf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // Calendly click tracking — fires book_call_click event for GA4 attribution
  document.querySelectorAll('a[href*="calendly.com"]').forEach(function(a) {
    a.addEventListener('click', function() {
      if (typeof gtag !== 'undefined') {
        gtag('event', 'book_call_click', {
          page_path: window.location.pathname,
          link_url: a.href
        });
      }
    });
  });
  </script>
